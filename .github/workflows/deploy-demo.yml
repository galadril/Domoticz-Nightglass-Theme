name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -r demo/. _site/
          cp custom.css _site/
          cp custom.js  _site/
          cp -r images  _site/
          # Demo files use ../custom.css and ../images/ (relative to demo/).
          # On Pages everything is flat, so rewrite to same-directory paths.
          sed -i 's|href="\.\./custom\.css"|href="custom.css"|g' _site/*.html
          sed -i 's|href="\.\./|href="|g'                        _site/*.html
          sed -i "s|src=\"\.\./images/|src=\"images/|g"          _site/*.html
          sed -i "s|src=\"\.\./images/|src=\"images/|g"          _site/navbar.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
